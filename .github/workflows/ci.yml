name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  swift-package:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Metadata Drift Check
        run: Scripts/check_repo_metadata.sh

      - name: Build
        run: swift build

      - name: Fast CPU-Safe Tests
        run: |
          swift test --filter TranscriptVectorTests
          swift test --filter WitnessPackingTests
          swift test --filter SupportCodecTests
          swift test --filter SyncProtocolTests
          swift test --filter ClusterWorkPacketTests

      - name: CLI Smoke
        run: |
          swift run NuMetalQAcceptanceDemo --help
          swift run NuMetalQBenchmarks --help
          swift run NuMetalQBenchmarks --list-workloads

      - name: Script Lint
        run: |
          bash -n Scripts/build_metal_artifacts.sh
          bash -n Scripts/check_repo_metadata.sh
